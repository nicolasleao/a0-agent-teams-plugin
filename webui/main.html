<html>

<head>
  <title>Agent Teams</title>
  <script type="module">
    import { store } from "/plugins/agent_teams/webui/agent-team-store.js";
    import { generateAvatar } from "/plugins/agent_teams/webui/avatar.js";
    window.__agentTeamAvatar = generateAvatar;
  </script>
  <style>
    /* ================================================================ */
    /*  SHARED                                                          */
    /* ================================================================ */
    .at-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text-muted, #888);
    }

    /* Buttons */
    .at-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .at-btn .material-symbols-outlined { font-size: 16px; }
    .at-btn-primary { background: var(--accent-color, #6495ed); color: #fff; }
    .at-btn-primary:hover { filter: brightness(1.1); }
    .at-btn-secondary { background: transparent; color: var(--text-color, #ddd); border-color: var(--border-color, #555); }
    .at-btn-secondary:hover { background: var(--bg-hover, rgba(255,255,255,0.05)); }
    .at-btn-danger { background: transparent; color: #e74c3c; border-color: rgba(231,76,60,0.3); }
    .at-btn-danger:hover { background: rgba(231,76,60,0.1); }
    .at-btn-sm { padding: 4px 8px; font-size: 11px; }
    .at-btn-sm .material-symbols-outlined { font-size: 14px; }
    .at-btn-ghost { background: transparent; color: var(--text-muted, #888); }
    .at-btn-ghost:hover { color: var(--text-color, #ddd); }

    /* Origin/scope badges */
    .at-badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-default { background: rgba(150,150,150,0.2); color: #aaa; }
    .badge-user { background: rgba(100,149,237,0.2); color: #6495ed; }
    .badge-plugin { background: rgba(155,89,182,0.2); color: #9b59b6; }
    .badge-project { background: rgba(46,204,113,0.2); color: #2ecc71; }
    .badge-mutable { background: rgba(46,204,113,0.15); color: #2ecc71; }
    .badge-readonly { background: rgba(150,150,150,0.15); color: #999; }

    /* ================================================================ */
    /*  TEAMS VIEW - NEW CLEAN DESIGN                                   */
    /* ================================================================ */
    .at-teams {
      min-height: 300px;
      padding: 8px 4px;
    }

    /* Hero Cards - Default & Global side by side */
    .at-hero-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .at-hero-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 28px 20px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid var(--border-color, #333);
      background: var(--bg-secondary, rgba(255,255,255,0.02));
      text-align: center;
    }

    .at-hero-card:hover {
      background: var(--bg-hover, rgba(255,255,255,0.05));
      border-color: var(--accent-color, #6495ed);
      transform: translateY(-2px);
    }

    .at-hero-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 16px;
    }

    .at-hero-icon .material-symbols-outlined {
      font-size: 36px;
    }

    .at-hero-icon-default { background: rgba(150,150,150,0.15); color: #aaa; }
    .at-hero-icon-user { background: rgba(100,149,237,0.15); color: #6495ed; }

    .at-hero-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-color, #eee);
    }

    .at-hero-meta {
      font-size: 13px;
      color: var(--text-muted, #888);
    }

    /* Explanation text */
    .at-explanation {
      text-align: center;
      padding: 12px 16px;
      margin-bottom: 16px;
      color: var(--text-muted, #888);
      font-size: 13px;
      line-height: 1.5;
    }

    .at-explanation strong {
      color: var(--text-color, #ddd);
      font-weight: 600;
    }

    /* Search bar */
    .at-search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .at-search-input {
      flex: 1;
      background: var(--bg-input, rgba(255,255,255,0.05));
      border: 1px solid var(--border-color, #444);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-color, #eee);
      outline: none;
    }

    .at-search-input:focus {
      border-color: var(--accent-color, #6495ed);
    }

    .at-search-input::placeholder {
      color: var(--text-muted, #666);
    }

    /* Project section header */
    .at-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .at-section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted, #666);
      letter-spacing: 0.5px;
    }

    .at-section-count {
      font-size: 11px;
      color: var(--text-muted, #888);
    }

    /* Compact project cards */
    .at-projects-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .at-project-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border-color, #333);
      background: var(--bg-secondary, rgba(255,255,255,0.02));
    }

    .at-project-card:hover {
      background: var(--bg-hover, rgba(255,255,255,0.05));
      border-color: var(--accent-color, #6495ed);
    }

    .at-project-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      flex-shrink: 0;
      background: rgba(46,204,113,0.15);
      color: #2ecc71;
    }

    .at-project-icon .material-symbols-outlined {
      font-size: 18px;
    }

    .at-project-info {
      flex: 1;
      min-width: 0;
    }

    .at-project-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-color, #eee);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .at-project-agents {
      font-size: 12px;
      color: var(--text-muted, #888);
    }

    .at-project-arrow {
      flex-shrink: 0;
      color: var(--text-muted, #666);
      font-size: 18px;
    }

    /* Empty state */
    .at-empty-projects {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted, #888);
      font-size: 13px;
    }

    /* Pagination */
    .at-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color, #333);
    }

    .at-page-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border-color, #444);
      background: transparent;
      color: var(--text-color, #ddd);
      cursor: pointer;
      transition: all 0.15s;
    }

    .at-page-btn:hover:not(:disabled) {
      background: var(--bg-hover, rgba(255,255,255,0.05));
      border-color: var(--accent-color, #6495ed);
    }

    .at-page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .at-page-btn .material-symbols-outlined {
      font-size: 16px;
    }

    .at-page-info {
      font-size: 12px;
      color: var(--text-muted, #888);
      min-width: 60px;
      text-align: center;
    }

    /* See all projects button */
    .at-see-all-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 20px auto 0;
      padding: 8px 16px;
      border: 1px solid var(--border-color, #444);
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted, #888);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .at-see-all-btn:hover {
      background: var(--bg-hover, rgba(255,255,255,0.05));
      color: var(--text-color, #ddd);
      border-color: var(--accent-color, #6495ed);
    }

    .at-see-all-btn .material-symbols-outlined {
      font-size: 16px;
    }
    /* ================================================================ */
    /*  AGENTS VIEW (two-panel)                                         */
    /* ================================================================ */
    .at-agents-view {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 400px;
      max-height: 70vh;
    }

    .at-agents-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color, #333);
    }

    .at-agents-toolbar h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-color, #eee);
      flex: 1;
    }

    .at-agents-panels {
      display: flex;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    /* Left Panel: Agent List */
    .at-list-panel {
      flex: 0 0 280px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .at-agent-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .at-agent-card:hover { background: var(--bg-hover, rgba(255,255,255,0.05)); }
    .at-agent-card.active {
      background: var(--bg-active, rgba(100,149,237,0.15));
      border-color: var(--accent-color, #6495ed);
    }

    .at-agent-card .at-avatar {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
    }
    .at-agent-card .at-avatar svg { width: 40px; height: 40px; display: block; }

    .at-card-info { flex: 1; min-width: 0; }
    .at-card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-color, #eee);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .at-card-name {
      font-size: 11px;
      color: var(--text-muted, #888);
      font-family: monospace;
    }

    .at-empty-list {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      color: var(--text-muted, #888);
      font-size: 13px;
      text-align: center;
    }

    /* Right Panel: Detail / Edit */
    .at-detail-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding-left: 16px;
      border-left: 1px solid var(--border-color, #333);
    }

    .at-empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted, #888);
      font-size: 14px;
    }

    /* Detail view */
    .at-detail-header { display: flex; align-items: center; gap: 16px; }
    .at-detail-avatar {
      flex-shrink: 0;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      overflow: hidden;
    }
    .at-detail-avatar svg { width: 72px; height: 72px; display: block; }
    .at-detail-meta h2 { margin: 0 0 4px; font-size: 18px; color: var(--text-color, #eee); }
    .at-detail-meta .at-detail-name { font-family: monospace; font-size: 12px; color: var(--text-muted, #888); }
    .at-detail-actions { display: flex; gap: 8px; margin-top: 4px; }

    .at-section { margin-top: 8px; }
    .at-section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted, #888);
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    .at-section-content {
      font-size: 13px;
      color: var(--text-color, #ddd);
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .at-prompts-list { display: flex; flex-direction: column; gap: 8px; }
    .at-prompt-item {
      background: var(--bg-secondary, rgba(255,255,255,0.03));
      border-radius: 6px;
      padding: 8px 12px;
    }
    .at-prompt-item .at-prompt-name {
      font-family: monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-color, #6495ed);
      margin-bottom: 4px;
    }
    .at-prompt-item .at-prompt-content {
      font-size: 12px;
      color: var(--text-muted, #999);
      max-height: 80px;
      overflow: hidden;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    /* Form */
    .at-form { display: flex; flex-direction: column; gap: 12px; }
    .at-form-group { display: flex; flex-direction: column; gap: 4px; }
    .at-form-group label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted, #888);
      letter-spacing: 0.5px;
    }
    .at-form-group input[type="text"],
    .at-form-group textarea {
      background: var(--bg-input, rgba(255,255,255,0.05));
      border: 1px solid var(--border-color, #444);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      color: var(--text-color, #eee);
      font-family: inherit;
      resize: vertical;
    }
    .at-form-group input:focus,
    .at-form-group textarea:focus { outline: none; border-color: var(--accent-color, #6495ed); }
    .at-form-group textarea { min-height: 60px; }
    .at-form-group textarea.at-prompt-textarea { min-height: 100px; font-family: monospace; font-size: 12px; }
    .at-form-group .at-slug-preview { font-size: 11px; color: var(--text-muted, #888); font-family: monospace; }
    .at-form-actions { display: flex; gap: 8px; padding-top: 8px; }

    .at-prompt-form-header { display: flex; align-items: center; gap: 8px; }
    .at-prompt-form-header input {
      flex: 1;
      background: var(--bg-input, rgba(255,255,255,0.05));
      border: 1px solid var(--border-color, #444);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      color: var(--text-color, #eee);
      font-family: monospace;
    }
    .at-prompt-edit-item {
      background: var(--bg-secondary, rgba(255,255,255,0.03));
      border-radius: 6px;
      padding: 8px 12px;
    }
    .at-prompt-edit-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .at-prompt-edit-header span { font-family: monospace; font-size: 12px; font-weight: 600; color: var(--accent-color, #6495ed); }

    /* Responsive */
    @media (max-width: 700px) {
      .at-agents-panels { flex-direction: column; }
      .at-list-panel { flex: 0 0 auto; max-height: 200px; }
      .at-detail-panel { border-left: none; padding-left: 0; border-top: 1px solid var(--border-color, #333); padding-top: 12px; }
      .at-hero-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div x-data="teamsView()">
    <template x-if="$store.agentTeamStore">
      <div x-create="$store.agentTeamStore.onOpen()" x-destroy="$store.agentTeamStore.cleanup()">

        <!-- ================================================================ -->
        <!--  TEAMS VIEW - NEW CLEAN DESIGN                                   -->
        <!-- ================================================================ -->
        <template x-if="$store.agentTeamStore.currentView === 'teams'">
          <div class="at-teams">

            <!-- Loading -->
            <div x-show="$store.agentTeamStore.loadingTeams" class="at-loading">Loading teams...</div>

            <div x-show="!$store.agentTeamStore.loadingTeams">

              <!-- Hero Cards: Default & Global side by side -->
              <div class="at-hero-cards">
                <!-- Default Team -->
                <template x-for="team in $store.agentTeamStore.teams.filter(t => t.scope === 'default')" :key="team.id">
                  <div class="at-hero-card" @click="$store.agentTeamStore.selectTeam(team)">
                    <div class="at-hero-icon at-hero-icon-default">
                      <span class="material-symbols-outlined">smart_toy</span>
                    </div>
                    <div class="at-hero-title" x-text="team.title"></div>
                    <div class="at-hero-meta">
                      <span x-text="team.agent_count + ' built-in agent' + (team.agent_count !== 1 ? 's' : '')"></span>
                    </div>
                  </div>
                </template>

                <!-- Global Team -->
                <template x-for="team in $store.agentTeamStore.teams.filter(t => t.scope === 'user')" :key="team.id">
                  <div class="at-hero-card" @click="$store.agentTeamStore.selectTeam(team)">
                    <div class="at-hero-icon at-hero-icon-user">
                      <span class="material-symbols-outlined">public</span>
                    </div>
                    <div class="at-hero-title" x-text="team.title"></div>
                    <div class="at-hero-meta">
                      <span x-text="team.agent_count + ' custom agent' + (team.agent_count !== 1 ? 's' : '')"></span>
                      <span class="at-badge badge-mutable" style="margin-left:6px;">editable</span>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Concise explanation -->
              <div class="at-explanation">
                Create a <strong>separate team per project</strong> to organize agents by workspace
              </div>

              <!-- Project Teams Section -->
              <div x-show="projectTeams.length > 0">
                <!-- Search bar -->
                <div class="at-search-row">
                  <input
                    type="text"
                    class="at-search-input"
                    placeholder="Search projects..."
                    x-model="searchQuery"
                  />
                </div>

                <!-- Section header -->
                <div class="at-section-header">
                  <span class="at-section-title">Project Teams</span>
                  <span class="at-section-count">
                    <span x-text="filteredProjects.length"></span> project<span x-show="filteredProjects.length !== 1">s</span>
                  </span>
                </div>

                <!-- Project list -->
                <div class="at-projects-list">
                  <template x-for="team in paginatedProjects" :key="team.id">
                    <div class="at-project-card" @click="$store.agentTeamStore.selectTeam(team)">
                      <div class="at-project-icon"
                        :style="team.color ? 'background:' + team.color + '22; color:' + team.color : ''">
                        <span class="material-symbols-outlined">folder</span>
                      </div>
                      <div class="at-project-info">
                        <div class="at-project-title" x-text="team.title"></div>
                        <div class="at-project-agents" x-text="team.agent_count + ' agent' + (team.agent_count !== 1 ? 's' : '')"></div>
                      </div>
                      <span class="at-project-arrow material-symbols-outlined">chevron_right</span>
                    </div>
                  </template>
                </div>

                <!-- Empty search result -->
                <div x-show="filteredProjects.length === 0 && searchQuery" class="at-empty-projects">
                  No projects match "<span x-text="searchQuery"></span>"
                </div>

                <!-- See all projects button (only when hiding empty projects) -->
                <button
                  x-show="!showAllProjects && hasEmptyProjects"
                  class="at-see-all-btn"
                  @click="toggleShowAll()"
                >
                  <span class="material-symbols-outlined">expand_more</span>
                  See all projects
                </button>

                <!-- Show only active button (when showing all) -->
                <button
                  x-show="showAllProjects"
                  class="at-see-all-btn"
                  @click="toggleShowAll()"
                >
                  <span class="material-symbols-outlined">expand_less</span>
                  Show only active projects
                </button>

              <!-- No projects yet -->
              <div x-show="projectTeams.length === 0" class="at-empty-projects">
                No project teams yet. Create a project to get started.
              </div>

            </div>
          </div>
        </template>

        <!-- ================================================================ -->
        <!--  AGENTS VIEW                                                      -->
        <!-- ================================================================ -->
        <template x-if="$store.agentTeamStore.currentView === 'agents'">
          <div class="at-agents-view">

            <!-- Toolbar -->
            <div class="at-agents-toolbar">
              <button class="at-btn at-btn-secondary at-btn-sm" @click="$store.agentTeamStore.backToTeams()">
                <span class="material-symbols-outlined">arrow_back</span> Teams
              </button>
              <h3 x-text="$store.agentTeamStore.selectedTeam?.title || 'Agents'"></h3>
              <button class="at-btn at-btn-primary at-btn-sm"
                x-show="$store.agentTeamStore.canCreateAgent"
                @click="$store.agentTeamStore.openCreate()">
                <span class="material-symbols-outlined">add</span> New
              </button>
            </div>

            <!-- Two-panel layout -->
            <div class="at-agents-panels">

              <!-- LEFT: Agent list -->
              <div class="at-list-panel">
                <!-- Loading -->
                <div x-show="$store.agentTeamStore.loading && $store.agentTeamStore.agents.length === 0"
                  class="at-loading">Loading agents...</div>

                <!-- Empty -->
                <div x-show="!$store.agentTeamStore.loading && $store.agentTeamStore.agents.length === 0"
                  class="at-empty-list">
                  <span x-text="$store.agentTeamStore.canCreateAgent ? 'No agents yet. Click + New to create one.' : 'No agents in this team.'"></span>
                </div>

                <!-- Agent cards -->
                <template x-for="agent in $store.agentTeamStore.agents" :key="agent.name">
                  <div class="at-agent-card"
                    :class="{ 'active': $store.agentTeamStore.selectedAgent?.name === agent.name && $store.agentTeamStore.editMode === 'view' }"
                    @click="$store.agentTeamStore.loadAgent(agent.name)">
                    <div class="at-avatar" x-html="window.__agentTeamAvatar(agent.name, 40)"></div>
                    <div class="at-card-info">
                      <div class="at-card-title" x-text="agent.title || agent.name"></div>
                      <span class="at-card-name" x-text="agent.name"></span>
                    </div>
                  </div>
                </template>
              </div>

              <!-- RIGHT: Detail / Edit -->
              <div class="at-detail-panel">

                <!-- Empty state -->
                <template x-if="!$store.agentTeamStore.selectedAgent && $store.agentTeamStore.editMode === 'view'">
                  <div class="at-empty-state">
                    <span>Select an agent to view details</span>
                  </div>
                </template>

                <!-- Loading agent -->
                <div x-show="$store.agentTeamStore.loadingAgent" class="at-loading">Loading agent...</div>

                <!-- ===== VIEW MODE ===== -->
                <template x-if="$store.agentTeamStore.selectedAgent && $store.agentTeamStore.editMode === 'view' && !$store.agentTeamStore.loadingAgent">
                  <div>
                    <div class="at-detail-header">
                      <div class="at-detail-avatar"
                        x-html="window.__agentTeamAvatar($store.agentTeamStore.selectedAgent.name, 72)"></div>
                      <div class="at-detail-meta">
                        <h2 x-text="$store.agentTeamStore.selectedAgent.title || $store.agentTeamStore.selectedAgent.name"></h2>
                        <div class="at-detail-name" x-text="$store.agentTeamStore.selectedAgent.name"></div>
                        <div style="margin-top:4px;">
                          <span class="at-badge"
                            :class="$store.agentTeamStore.originBadgeClass($store.agentTeamStore.selectedAgent.origin)"
                            x-text="$store.agentTeamStore.originLabel($store.agentTeamStore.selectedAgent.origin)"></span>
                        </div>
                      </div>
                    </div>

                    <!-- Actions (only for mutable teams) -->
                    <div class="at-detail-actions" x-show="$store.agentTeamStore.canCreateAgent">
                      <button class="at-btn at-btn-secondary at-btn-sm"
                        @click="$store.agentTeamStore.openEdit()">
                        <span class="material-symbols-outlined">edit</span> Edit
                      </button>
                      <button class="at-btn at-btn-danger at-btn-sm"
                        x-show="$store.agentTeamStore.selectedAgent.is_deletable"
                        @click="$store.agentTeamStore.deleteAgent($store.agentTeamStore.selectedAgent.name)">
                        <span class="material-symbols-outlined">delete</span> Delete
                      </button>
                    </div>

                    <div class="at-section" x-show="$store.agentTeamStore.selectedAgent.description">
                      <div class="at-section-label">Description</div>
                      <div class="at-section-content" x-text="$store.agentTeamStore.selectedAgent.description"></div>
                    </div>

                    <div class="at-section" x-show="$store.agentTeamStore.selectedAgent.context">
                      <div class="at-section-label">Context</div>
                      <div class="at-section-content" x-text="$store.agentTeamStore.selectedAgent.context"></div>
                    </div>

                    <div class="at-section" x-show="$store.agentTeamStore.selectedPromptEntries.length > 0">
                      <div class="at-section-label">Prompts</div>
                      <div class="at-prompts-list">
                        <template x-for="[name, content] in $store.agentTeamStore.selectedPromptEntries" :key="name">
                          <div class="at-prompt-item">
                            <div class="at-prompt-name" x-text="name"></div>
                            <div class="at-prompt-content" x-text="content"></div>
                          </div>
                        </template>
                      </div>
                    </div>
                  </div>
                </template>

                <!-- ===== CREATE MODE ===== -->
                <template x-if="$store.agentTeamStore.editMode === 'create'">
                  <div>
                    <h3 style="margin:0 0 12px; font-size:16px; color:var(--text-color,#eee);">Create Agent</h3>

                    <form class="at-form" @submit.prevent="$store.agentTeamStore.saveCreate()">
                      <div class="at-form-group">
                        <label>Agent Name</label>
                        <input type="text" x-model="$store.agentTeamStore.form.name"
                          placeholder="e.g., code-reviewer"
                          @input="$store.agentTeamStore.updateSlugPreview()">
                        <div class="at-slug-preview" x-show="$store.agentTeamStore.slugPreview"
                          x-text="'Will be saved as: ' + $store.agentTeamStore.slugPreview"></div>
                      </div>

                      <div class="at-form-group">
                        <label>Title <span style="color:var(--text-muted,#666);">(optional)</span></label>
                        <input type="text" x-model="$store.agentTeamStore.form.title"
                          placeholder="e.g., Code Reviewer">
                      </div>

                      <div class="at-form-group">
                        <label>Description <span style="color:var(--text-muted,#666);">(optional)</span></label>
                        <textarea x-model="$store.agentTeamStore.form.description"
                          placeholder="What this agent does..."></textarea>
                      </div>

                      <div class="at-form-group">
                        <label>Context <span style="color:var(--text-muted,#666);">(optional)</span></label>
                        <textarea x-model="$store.agentTeamStore.form.context"
                          placeholder="Additional context for this agent..."></textarea>
                      </div>

                      <div class="at-form-group">
                        <label>Prompts</label>
                        <div style="display:flex; flex-direction:column; gap:8px;">
                          <template x-for="(prompt, index) in $store.agentTeamStore.form.prompts" :key="index">
                            <div class="at-prompt-edit-item">
                              <div class="at-prompt-edit-header">
                                <input type="text" x-model="prompt.name" placeholder="prompt_name.md">
                                <button type="button" class="at-btn at-btn-danger at-btn-sm"
                                  @click="$store.agentTeamStore.removePrompt(index)">
                                  <span class="material-symbols-outlined">delete</span>
                                </button>
                              </div>
                              <textarea class="at-prompt-textarea" x-model="prompt.content"
                                placeholder="Enter prompt content..."></textarea>
                            </div>
                          </template>
                          <button type="button" class="at-btn at-btn-secondary at-btn-sm"
                            @click="$store.agentTeamStore.addPrompt()">
                            <span class="material-symbols-outlined">add</span> Add Prompt
                          </button>
                        </div>
                      </div>

                      <div class="at-form-actions">
                        <button type="submit" class="at-btn at-btn-primary">Create</button>
                        <button type="button" class="at-btn at-btn-secondary"
                          @click="$store.agentTeamStore.cancelEdit()">Cancel</button>
                      </div>
                    </form>
                  </div>
                </template>

                <!-- ===== EDIT MODE ===== -->
                <template x-if="$store.agentTeamStore.editMode === 'edit'">
                  <div>
                    <h3 style="margin:0 0 12px; font-size:16px; color:var(--text-color,#eee);">Edit Agent</h3>

                    <form class="at-form" @submit.prevent="$store.agentTeamStore.saveEdit()">
                      <div class="at-form-group">
                        <label>Name</label>
                        <input type="text" :value="$store.agentTeamStore.selectedAgent.name" disabled
                          style="opacity:0.6; cursor:not-allowed;">
                      </div>

                      <div class="at-form-group">
                        <label>Title <span style="color:var(--text-muted,#666);">(optional)</span></label>
                        <input type="text" x-model="$store.agentTeamStore.form.title">
                      </div>

                      <div class="at-form-group">
                        <label>Description <span style="color:var(--text-muted,#666);">(optional)</span></label>
                        <textarea x-model="$store.agentTeamStore.form.description"></textarea>
                      </div>

                      <div class="at-form-group">
                        <label>Context <span style="color:var(--text-muted,#666);">(optional)</span></label>
                        <textarea x-model="$store.agentTeamStore.form.context"></textarea>
                      </div>

                      <div class="at-form-group">
                        <label>Prompts</label>
                        <div style="display:flex; flex-direction:column; gap:8px;">
                          <template x-for="(prompt, index) in $store.agentTeamStore.form.prompts" :key="index">
                            <div class="at-prompt-edit-item">
                              <div class="at-prompt-edit-header">
                                <input type="text" x-model="prompt.name" placeholder="prompt_name.md">
                                <button type="button" class="at-btn at-btn-danger at-btn-sm"
                                  @click="$store.agentTeamStore.removePrompt(index)">
                                  <span class="material-symbols-outlined">delete</span>
                                </button>
                              </div>
                              <textarea class="at-prompt-textarea" x-model="prompt.content"
                                placeholder="Enter prompt content..."></textarea>
                            </div>
                          </template>
                          <button type="button" class="at-btn at-btn-secondary at-btn-sm"
                            @click="$store.agentTeamStore.addPrompt()">
                            <span class="material-symbols-outlined">add</span> Add Prompt
                          </button>
                        </div>
                      </div>

                      <div class="at-form-actions">
                        <button type="submit" class="at-btn at-btn-primary">Save Changes</button>
                        <button type="button" class="at-btn at-btn-secondary"
                          @click="$store.agentTeamStore.cancelEdit()">Cancel</button>
                      </div>
                    </form>
                  </div>
                </template>

              </div>
            </div>
          </div>
        </template>

      </div>
    </template>
  </div>

  <script>
    function teamsView() {
      return {
        searchQuery: '',
        currentPage: 1,
        projectsPerPage: 5,
        showAllProjects: false, // Default: hide empty projects

        get projectTeams() {
          if (!this.$store?.agentTeamStore?.teams) return [];
          return this.$store.agentTeamStore.teams
            .filter(t => t.scope === 'project')
            .sort((a, b) => b.agent_count - a.agent_count); // Sort by agent count, most first
        },

        get hasEmptyProjects() {
          return this.projectTeams.some(p => p.agent_count === 0);
        },

        get filteredProjects() {
          let projects = this.projectTeams;
          
          // Filter out empty projects unless showing all
          if (!this.showAllProjects) {
            projects = projects.filter(p => p.agent_count > 0);
          }
          
          // Apply search filter
          if (this.searchQuery.trim()) {
            const query = this.searchQuery.toLowerCase();
            projects = projects.filter(p => p.title.toLowerCase().includes(query));
          }
          
          return projects;
        },

        get paginatedProjects() {
          const start = (this.currentPage - 1) * this.projectsPerPage;
          const end = start + this.projectsPerPage;
          return this.filteredProjects.slice(start, end);
        },

        get totalPages() {
          return Math.ceil(this.filteredProjects.length / this.projectsPerPage) || 1;
        },

        toggleShowAll() {
          this.showAllProjects = !this.showAllProjects;
          this.currentPage = 1; // Reset to first page
        },

        // Reset to page 1 when search changes
        init() {
          this.$watch('searchQuery', () => {
            this.currentPage = 1;
          });
        }
      }
    }
  </script>
  </script>
</body>

</html>
